<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mygame — ניהול תוכן</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{font-family:'Rubik',system-ui,sans-serif}
  body{background:#f4f5f7}
  .lbl{font-size:11px;font-weight:600;color:#9aa0a8;letter-spacing:.02em}
  input,textarea{transition:border-color .15s,box-shadow .15s}
  input:focus,textarea:focus{outline:none;border-color:#2665d6;box-shadow:0 0 0 3px rgba(38,101,214,.12)}
  .seg{background:#eef0f3;border-radius:999px;padding:3px;display:inline-flex}
  .seg button{border-radius:999px;padding:6px 16px;font-size:13px;font-weight:700;color:#6b7280}
  .seg button.on{background:#fff;color:#1e2330;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .navlink{display:block;padding:7px 12px;border-radius:10px;font-size:14px;color:#41464e;cursor:pointer}
  .navlink:hover{background:#eef0f3}
</style>
</head>
<body class="text-[#1e2330]">
<!-- LOGIN -->
<div id="login" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-[380px] bg-white rounded-3xl shadow-xl p-8">
    <div class="text-center mb-6"><div class="text-3xl font-extrabold tracking-tight">mygame</div><div class="text-[#8a8f98] mt-1">מערכת ניהול תוכן</div></div>
    <label class="lbl">שם משתמש</label>
    <input id="u" class="w-full border border-[#e2e4e9] rounded-xl px-4 py-3 mt-1 mb-4" autocomplete="username" />
    <label class="lbl">סיסמה</label>
    <input id="p" type="password" class="w-full border border-[#e2e4e9] rounded-xl px-4 py-3 mt-1 mb-2" autocomplete="current-password" />
    <div id="loginErr" class="text-red-500 text-sm h-5 mb-2"></div>
    <button id="loginBtn" class="w-full bg-[#111317] text-white font-bold rounded-xl py-3 hover:bg-[#2665d6] transition">כניסה</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="sticky top-0 z-20 bg-white border-b border-[#eceef1]">
    <div class="max-w-[1200px] mx-auto px-5 h-16 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <span class="text-xl font-extrabold">mygame</span>
        <div class="seg" id="devSeg"><button data-dev="desktop" class="on">🖥️ דסקטופ</button><button data-dev="mobile">📱 מובייל</button></div>
      </div>
      <div class="flex items-center gap-2">
        <input id="search" placeholder="חיפוש…" class="border border-[#e2e4e9] rounded-full px-4 py-2 text-sm w-[140px] sm:w-[200px]" />
        <a href="/" target="_blank" class="text-sm font-semibold text-[#2665d6] px-3 py-2 rounded-full hover:bg-[#e7effd] transition">מעבר לאתר ↗</a>
        <button id="saveBtn" class="bg-[#2665d6] text-white font-bold rounded-full px-5 py-2 text-sm hover:bg-[#1b51b0] transition disabled:opacity-50">שמירה ופרסום</button>
        <button id="logout" class="text-[#8a8f98] text-sm px-2 hover:text-[#1e2330]">יציאה</button>
      </div>
    </div>
  </header>

  <div id="savedNote" class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 bg-[#16a34a] text-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-lg z-30">נשמר ופורסם ✓</div>

  <div class="max-w-[1200px] mx-auto px-5 py-6 flex gap-6">
    <aside class="w-[210px] shrink-0 hidden md:block">
      <div class="sticky top-[88px]"><div class="lbl mb-2 px-2">סקשנים</div><nav id="sidebar" class="space-y-0.5"></nav></div>
    </aside>
    <main class="flex-1 min-w-0">
      <p class="text-[#8a8f98] text-sm mb-4">עורכים תוכן בעברית ובאנגלית, לפי סקשן. בחרו <b>דסקטופ</b> או <b>מובייל</b> למעלה. שינויים נשמרים ומתפרסמים מיד.</p>
      <div id="sections" class="space-y-8"></div>
    </main>
  </div>
</div>

<script>
var SUPA='https://xvlobuotrihngqvuwyka.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2bG9idW90cmlobmdxdnV3eWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1OTk5ODAsImV4cCI6MjA4NTE3NTk4MH0.i9VSgaEjzJDm9D64TqN7AY7kbBIL9F8bahs-dDp9B-g';
var H={apikey:ANON,Authorization:'Bearer '+ANON,'Content-Type':'application/json'};
var CREDS=null, FIELDS=[], DEF_CARDS=[], OV={desktop:{},mobile:{},carousel:null}, CARDS=[], DEV='desktop';
function rpc(fn,b){return fetch(SUPA+'/rest/v1/rpc/'+fn,{method:'POST',headers:H,body:JSON.stringify(b)}).then(function(r){return r.json();});}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function clone(o){return JSON.parse(JSON.stringify(o));}

function doLogin(){
  var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
  document.getElementById('loginErr').textContent='';
  rpc('cms_login',{p_user:u,p_pass:p}).then(function(ok){
    if(ok===true){CREDS={u:u,p:p};sessionStorage.setItem('cms',JSON.stringify(CREDS));start();}
    else document.getElementById('loginErr').textContent='שם משתמש או סיסמה שגויים';
  }).catch(function(){document.getElementById('loginErr').textContent='שגיאת חיבור';});
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('p').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

function start(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  Promise.all([
    fetch('/cms-fields.json').then(function(r){return r.json();}),
    fetch('/cms-carousel.json').then(function(r){return r.json();}),
    fetch(SUPA+'/rest/v1/site_content?id=eq.1&select=data',{headers:H}).then(function(r){return r.json();})
  ]).then(function(res){
    FIELDS=res[0]; DEF_CARDS=res[1]||[];
    var d=(res[2]&&res[2][0]&&res[2][0].data)||{};
    OV={desktop:d.desktop||{},mobile:d.mobile||{},carousel:d.carousel||null};
    CARDS=(OV.carousel&&OV.carousel.length)?clone(OV.carousel):clone(DEF_CARDS);
    render();
  });
}

function defOf(f,l){return (l==='he'?f.he:f.en)||'';}
function curVal(f,l){var b=OV[DEV][f.k];return (b&&b[l]!=null)?b[l]:defOf(f,l);}
function curUrl(f){var b=OV[DEV][f.k];return (b&&b.url)||'';}
function setVal(f,l,v){var b=OV[DEV][f.k]=OV[DEV][f.k]||{};b[l]=v;}

function sectionsForDevice(){
  var seen={},out=[];
  FIELDS.forEach(function(f){ if(f.devices.indexOf(DEV)<0)return; if(seen[f.section])return; seen[f.section]=1; out.push({id:f.section,name:f.sectionName,order:f.order}); });
  if(DEV==='desktop') out.push({id:'carousel',name:'קרוסלת משחקים',order:7});
  out.sort(function(a,b){return a.order-b.order;});
  return out;
}

function uploadImage(file, cb){
  var name=Date.now()+'_'+(file.name||'image').replace(/[^a-zA-Z0-9._-]/g,'_');
  fetch(SUPA+'/storage/v1/object/site-images/'+encodeURIComponent(name),{
    method:'POST',headers:{apikey:ANON,Authorization:'Bearer '+ANON,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},body:file
  }).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});return r.json();})
   .then(function(){cb(null,SUPA+'/storage/v1/object/public/site-images/'+encodeURIComponent(name));})
   .catch(function(e){cb(e);});
}
function fieldCard(f){ return f.type==='link'?linkCard(f):textCard(f); }
function textCard(f){
  return '<div class="rounded-xl border border-[#eceef1] p-3 grid sm:grid-cols-2 gap-3">'
    +'<div><div class="lbl mb-1">עברית</div><textarea data-k="'+esc(f.k)+'" data-l="he" dir="rtl" rows="2" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm resize-y">'+esc(curVal(f,'he'))+'</textarea></div>'
    +'<div><div class="lbl mb-1">English</div><textarea data-k="'+esc(f.k)+'" data-l="en" dir="ltr" rows="2" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm resize-y">'+esc(curVal(f,'en'))+'</textarea></div>'
    +'</div>';
}
function curHref(f){var b=OV[DEV][f.k];return (b&&b.href)||'';}
function linkCard(f){
  return '<div class="rounded-xl border border-[#eceef1] p-3">'
    +'<div class="font-semibold text-sm mb-1">'+esc(f.label||f.k)+' <span class="text-[#9aa0a8] font-normal">("'+esc(f.he)+'")</span></div>'
    +'<input data-k="'+esc(f.k)+'" data-link="1" dir="ltr" value="'+esc(curHref(f))+'" placeholder="https://… או #section" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/>'
    +'</div>';
}
function imageGrid(fields){
  var box=document.createElement('div'); box.className='grid grid-cols-2 sm:grid-cols-3 gap-3';
  fields.forEach(function(f){
    var d=document.createElement('div'); d.className='rounded-xl border border-[#eceef1] p-3 flex flex-col gap-2';
    d.innerHTML='<div class="aspect-video bg-[#f4f5f7] rounded-lg overflow-hidden flex items-center justify-center"><img src="'+(curUrl(f)||('/img/'+f.k))+'" class="prev max-w-full max-h-full object-contain"/></div>'
      +'<div class="font-semibold text-sm truncate" title="'+esc(f.k)+'">'+esc(f.label||f.k)+'</div>'
      +'<label class="text-xs font-bold text-[#2665d6] cursor-pointer hover:underline">⬆ העלאה מהמכשיר<input type="file" accept="image/*" data-up="'+esc(f.k)+'" class="hidden"/></label>'
      +'<input data-k="'+esc(f.k)+'" data-img="1" dir="ltr" value="'+esc(curUrl(f))+'" placeholder="או כתובת URL…" class="w-full border border-[#e2e4e9] rounded-lg px-2.5 py-1.5 text-xs"/>';
    box.appendChild(d);
  });
  return box;
}
function bindInputs(scope){
  scope.querySelectorAll('textarea[data-k]').forEach(function(t){
    t.addEventListener('input',function(){var f=FIELDS.find(function(x){return x.k===t.getAttribute('data-k');});setVal(f,t.getAttribute('data-l'),t.value);});
  });
  scope.querySelectorAll('input[data-img]').forEach(function(inp){
    inp.addEventListener('input',function(){var f=FIELDS.find(function(x){return x.k===inp.getAttribute('data-k');});var b=OV[DEV][f.k]=OV[DEV][f.k]||{};if(inp.value.trim())b.url=inp.value.trim();else delete b.url;var pv=inp.closest('div').querySelector('.prev');if(pv)pv.src=inp.value.trim()||('/img/'+f.k);});
  });
  scope.querySelectorAll('input[data-link]').forEach(function(inp){
    inp.addEventListener('input',function(){var f=FIELDS.find(function(x){return x.k===inp.getAttribute('data-k');});var b=OV[DEV][f.k]=OV[DEV][f.k]||{};if(inp.value.trim())b.href=inp.value.trim();else delete b.href;});
  });
  scope.querySelectorAll('input[data-up]').forEach(function(up){
    up.addEventListener('change',function(){
      var file=up.files&&up.files[0]; if(!file)return;
      var k=up.getAttribute('data-up'),lab=up.parentElement,old=lab.firstChild.textContent; lab.firstChild.textContent='מעלה…';
      uploadImage(file,function(err,url){
        lab.firstChild.textContent=old;
        if(err){alert('העלאה נכשלה: '+err.message);return;}
        var b=OV[DEV][k]=OV[DEV][k]||{};b.url=url;
        var cell=up.closest('.rounded-xl')||up.closest('div');
        var pv=cell.querySelector('.prev'); if(pv)pv.src=url;
        var urlInp=cell.querySelector('input[data-img]'); if(urlInp)urlInp.value=url;
      });
    });
  });
}
var PREVSEC={hero:'',how:'how',why:'why',who:'who',types:'types',carousel:'games',nobs:'nobs',faq:'faq',footer:'cta'};
function sectionPreview(sid){
  if(!(sid in PREVSEC))return null;
  var anchor=PREVSEC[sid], mobile=DEV==='mobile';
  var wrap=document.createElement('div'); wrap.className='mb-4 rounded-xl overflow-hidden border border-[#e6e8eb] bg-[#f4f5f7]';
  wrap.innerHTML='<div class="lbl px-3 py-1.5 flex items-center justify-between"><span>👁 תצוגה חיה של הסקשן</span><span class="text-[#c2c6cc]">'+(mobile?'מובייל':'דסקטופ')+'</span></div>';
  var ifr=document.createElement('iframe');
  ifr.src='/?cms=preview'+(anchor?('&sec='+anchor):'');
  ifr.className='cms-prev block bg-white mx-auto'; ifr.setAttribute('loading','lazy'); ifr.setAttribute('scrolling','no');
  ifr.style.cssText='border:0;width:'+(mobile?'390px':'100%')+';height:'+(mobile?'560px':'320px')+';pointer-events:none';
  wrap.appendChild(ifr); return wrap;
}
function reloadPreviews(){ document.querySelectorAll('iframe.cms-prev').forEach(function(f){ f.src=f.src; }); }
function render(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var secs=sectionsForDevice();
  var sb=document.getElementById('sidebar'); sb.innerHTML='';
  secs.forEach(function(s){var a=document.createElement('a');a.className='navlink';a.textContent=s.name;a.onclick=function(){var el=document.getElementById('sec_'+s.id);if(el){el.querySelector('.acc-h').click();el.scrollIntoView({behavior:'smooth',block:'start'});}};sb.appendChild(a);});
  var root=document.getElementById('sections'); root.innerHTML='';
  var first=true;
  secs.forEach(function(s){
    var devOk=(s.id==='faq')?function(){return true;}:function(f){return f.devices.indexOf(DEV)>=0;};
    var all=FIELDS.filter(function(f){return f.section===s.id;}).filter(devOk)
      .filter(function(f){if(!q)return true;return((f.he||'')+(f.en||'')+(f.label||'')).toLowerCase().indexOf(q)>=0;});
    var texts=all.filter(function(f){return f.type==='text'||f.type==='link';});
    var imgs=all.filter(function(f){return f.type==='img';});
    var count = s.id==='carousel'? CARDS.length : all.length;
    if(s.id!=='carousel' && !count) return;
    var open = !!q || first; first=false;
    var sec=document.createElement('section'); sec.id='sec_'+s.id; sec.className='bg-white rounded-2xl border border-[#eceef1] overflow-hidden';
    var unit = s.id==='carousel'?'כרטיסיות':(all.length+' שדות');
    sec.innerHTML='<button type="button" class="acc-h w-full flex items-center justify-between px-4 py-3 text-right hover:bg-[#fafbfc]"><span class="font-extrabold">'+esc(s.name)+'</span><span class="text-xs text-[#9aa0a8] font-semibold">'+(s.id==='carousel'?count+' כרטיסיות':unit)+'</span></button><div class="acc-b border-t border-[#f1f2f4] p-4" '+(open?'':'style="display:none"')+'></div>';
    var bodyEl=sec.querySelector('.acc-b');
    function fill(){
      if(bodyEl._filled)return; bodyEl._filled=1;
      if(!q){ var pv=sectionPreview(s.id); if(pv)bodyEl.appendChild(pv); }
      if(s.id==='carousel'){ bodyEl.appendChild(carouselEditor()); return; }
      if(texts.length){ var tw=document.createElement('div'); tw.className='grid gap-3'; tw.innerHTML=texts.map(fieldCard).join(''); bodyEl.appendChild(tw); }
      if(imgs.length){ var ih=document.createElement('div'); ih.className='mt-4'; ih.innerHTML='<div class="lbl mb-2">🖼️ תמונות הסקשן</div>'; ih.appendChild(imageGrid(imgs)); bodyEl.appendChild(ih); }
      bindInputs(bodyEl);
    }
    if(open)fill();
    sec.querySelector('.acc-h').onclick=function(){ var hidden=bodyEl.style.display==='none'; bodyEl.style.display=hidden?'':'none'; if(hidden)fill(); };
    root.appendChild(sec);
  });
}

function carouselEditor(){
  var box=document.createElement('div');
  function draw(){
    box.innerHTML='';
    CARDS.forEach(function(c,i){
      var d=document.createElement('div'); d.className='bg-white rounded-2xl border border-[#eceef1] p-4 mb-3';
      d.innerHTML=
        '<div class="flex items-start gap-4">'
        +'<img src="'+esc((c.img&&/^https?:|^\//.test(c.img))?c.img:('/img/'+(c.img||'')))+'" class="cpv w-16 h-16 object-cover rounded-lg bg-[#f4f5f7] border border-[#eceef1]"/>'
        +'<div class="flex-1 grid sm:grid-cols-2 gap-2">'
        +'<div><div class="lbl mb-1">כותרת (עברית)</div><input data-i="'+i+'" data-f="he" dir="rtl" value="'+esc(c.he||'')+'" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/></div>'
        +'<div><div class="lbl mb-1">Title (English)</div><input data-i="'+i+'" data-f="en" dir="ltr" value="'+esc(c.en||'')+'" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/></div>'
        +'<div><div class="lbl mb-1">תגיות עברית (פסיק)</div><input data-i="'+i+'" data-f="tags" dir="rtl" value="'+esc((c.tags||[]).join(', '))+'" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/></div>'
        +'<div><div class="lbl mb-1">Tags English (comma)</div><input data-i="'+i+'" data-f="tagsEn" dir="ltr" value="'+esc((c.tagsEn||[]).join(', '))+'" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/></div>'
        +'<div class="sm:col-span-2"><div class="lbl mb-1">תמונה (שם קובץ או URL) · <label class="text-[#2665d6] font-bold cursor-pointer hover:underline">⬆ העלאה<input type="file" accept="image/*" data-cardup="'+i+'" class="hidden"/></label></div><input data-i="'+i+'" data-f="img" dir="ltr" value="'+esc(c.img||'')+'" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/></div>'
        +'<div><div class="lbl mb-1">🎨 צבע הכרטיסיה בהובר</div><div class="flex items-center gap-2"><input data-i="'+i+'" data-f="hoverColor" type="color" value="'+esc(c.hoverColor||'#ffffff')+'" class="h-9 w-12 border border-[#e2e4e9] rounded-lg cursor-pointer"/><input data-i="'+i+'" data-f="hoverColorText" dir="ltr" value="'+esc(c.hoverColor||'')+'" placeholder="#RRGGBB" class="flex-1 border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/></div></div>'
        +'<div><div class="lbl mb-1">🎬 וידאו בהובר · <label class="text-[#2665d6] font-bold cursor-pointer hover:underline">⬆ העלאה<input type="file" accept="video/*" data-cardvid="'+i+'" class="hidden"/></label></div><input data-i="'+i+'" data-f="video" dir="ltr" value="'+esc(c.video||'')+'" placeholder="URL וידאו (mp4/webm)…" class="w-full border border-[#e2e4e9] rounded-xl px-3 py-2 text-sm"/></div>'
        +'</div>'
        +'<button data-rm="'+i+'" class="text-red-500 text-sm font-semibold shrink-0 hover:underline">מחיקה</button>'
        +'</div>';
      box.appendChild(d);
    });
    var add=document.createElement('button'); add.className='bg-[#eef0f3] text-[#1e2330] font-semibold rounded-xl px-4 py-2 text-sm hover:bg-[#e2e4e9]';
    add.textContent='+ הוסף כרטיסיה'; add.onclick=function(){CARDS.push({he:'',en:'',tags:[],tagsEn:[],img:''});draw();}; box.appendChild(add);
    box.querySelectorAll('input[data-i]').forEach(function(inp){
      inp.addEventListener('input',function(){
        var i=+inp.getAttribute('data-i'),f=inp.getAttribute('data-f'),v=inp.value;
        if(f==='tags'||f==='tagsEn')CARDS[i][f]=v.split(',').map(function(s){return s.trim();}).filter(Boolean);
        else if(f==='hoverColorText'){CARDS[i].hoverColor=v;var cp=inp.parentElement.querySelector('input[data-f="hoverColor"]');if(cp&&/^#[0-9a-fA-F]{6}$/.test(v))cp.value=v;}
        else if(f==='hoverColor'){CARDS[i].hoverColor=v;var tx=inp.parentElement.querySelector('input[data-f="hoverColorText"]');if(tx)tx.value=v;}
        else CARDS[i][f]=v;
        if(f==='img'){var pv=inp.closest('.bg-white').querySelector('.cpv');if(pv)pv.src=(v&&/^https?:|^\//.test(v))?v:('/img/'+v);}
      });
    });
    box.querySelectorAll('input[data-cardvid]').forEach(function(up){
      up.addEventListener('change',function(){
        var file=up.files&&up.files[0]; if(!file)return; var i=+up.getAttribute('data-cardvid');
        var lab=up.parentElement,old=lab.firstChild.textContent; lab.firstChild.textContent='מעלה…';
        uploadImage(file,function(err,url){ lab.firstChild.textContent=old;
          if(err){alert('העלאה נכשלה: '+err.message);return;}
          CARDS[i].video=url; var card=up.closest('.bg-white'); var vi=card.querySelector('input[data-f="video"]'); if(vi)vi.value=url;
        });
      });
    });
    box.querySelectorAll('input[data-cardup]').forEach(function(up){
      up.addEventListener('change',function(){
        var file=up.files&&up.files[0]; if(!file)return; var i=+up.getAttribute('data-cardup');
        var lab=up.parentElement,old=lab.firstChild.textContent; lab.firstChild.textContent='מעלה…';
        uploadImage(file,function(err,url){ lab.firstChild.textContent=old;
          if(err){alert('העלאה נכשלה: '+err.message);return;}
          CARDS[i].img=url; var card=up.closest('.bg-white'); var ii=card.querySelector('input[data-f="img"]'); if(ii)ii.value=url; var pv=card.querySelector('.cpv'); if(pv)pv.src=url;
        });
      });
    });
    box.querySelectorAll('button[data-rm]').forEach(function(b){b.onclick=function(){CARDS.splice(+b.getAttribute('data-rm'),1);draw();};});
  }
  draw();
  return box;
}

function clean(bucket){
  var out={};
  Object.keys(bucket).forEach(function(k){
    var rec=bucket[k]; var f=FIELDS.find(function(x){return x.k===k;}); if(!f)return; var o={};
    if(rec.he!=null&&rec.he!==(f.he||''))o.he=rec.he;
    if(rec.en!=null&&rec.en!==(f.en||''))o.en=rec.en;
    if(rec.url)o.url=rec.url;
    if(rec.href)o.href=rec.href;
    if(Object.keys(o).length)out[k]=o;
  });
  return out;
}
document.getElementById('saveBtn').onclick=function(){
  var btn=this; btn.disabled=true;
  var data={desktop:clean(OV.desktop),mobile:clean(OV.mobile)};
  if(JSON.stringify(CARDS)!==JSON.stringify(DEF_CARDS)) data.carousel=CARDS;
  rpc('cms_save',{p_user:CREDS.u,p_pass:CREDS.p,p_data:data}).then(function(ok){
    btn.disabled=false;
    if(ok===true){OV.desktop=data.desktop;OV.mobile=data.mobile;OV.carousel=data.carousel||null;reloadPreviews();var n=document.getElementById('savedNote');n.classList.remove('hidden');setTimeout(function(){n.classList.add('hidden');},2200);}
    else alert('שמירה נכשלה — התחברו מחדש');
  }).catch(function(){btn.disabled=false;alert('שגיאת חיבור בשמירה');});
};
document.getElementById('search').addEventListener('input',render);
document.getElementById('logout').onclick=function(){sessionStorage.removeItem('cms');location.reload();};
document.querySelectorAll('#devSeg button').forEach(function(b){b.onclick=function(){
  DEV=b.getAttribute('data-dev');
  document.querySelectorAll('#devSeg button').forEach(function(x){x.classList.toggle('on',x===b);});
  render();
};});
(function(){var s=sessionStorage.getItem('cms');if(s){try{CREDS=JSON.parse(s);start();}catch(e){}}})();
</script>
